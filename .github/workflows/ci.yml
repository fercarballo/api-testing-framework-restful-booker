# ─────────────────────────────────────────────────────────────────────────────
# Pipeline de CI para testing de API.
#
# Notá lo LIVIANO que es comparado con un proyecto de UI: no hay que instalar
# navegadores (`npx playwright install`), porque el testing de API solo hace
# llamadas HTTP. Menos pasos, más rápido.
# ─────────────────────────────────────────────────────────────────────────────
name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias (reproducible)
        run: npm ci

      - name: Verificar tipos (TypeScript)
        run: npm run typecheck

      - name: Ejecutar la suite de API
        run: npm test

      - name: Subir el reporte de Playwright
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
